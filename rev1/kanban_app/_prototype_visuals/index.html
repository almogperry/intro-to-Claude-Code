<!DOCTYPE html>
<!--
  PROTOTYPE — throwaway. Delete after picking a variant.
  Question: do the user-reversed visual choices (inverted priority colours,
  large ✓ overlay, inline-grow expanded card with blurred backdrop) feel
  right when compared to conservative alternatives?

  3 variants, switchable via ?variant=A|B|C or the bottom bar.
    A — as-specified in project-description.md (everything inverted/new)
    B — conservative defaults (red=high, strikethrough, side drawer)
    C — hybrid (inverted colours kept, but ✓ as corner badge + centred modal)

  Same 9 sample tasks across all variants for fair comparison.
  Open this file directly in a browser. No server needed.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Kanban — visual prototype</title>
<style>
  :root {
    --bg: #f4f5f7;
    --col-bg: #ebecf0;
    --card-bg: #fff;
    --text: #172b4d;
    --muted: #5e6c84;
    --border: #dfe1e6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
  header { padding: 12px 20px; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header .badge { background: #ff5630; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }
  header .variant-name { margin-left: auto; font-size: 13px; color: var(--muted); }

  .board { display: flex; gap: 12px; padding: 16px; overflow-x: auto; min-height: calc(100vh - 110px); }
  .column { background: var(--col-bg); border-radius: 6px; padding: 8px; width: 280px; flex-shrink: 0; display: flex; flex-direction: column; }
  .column-header { padding: 6px 8px 10px; font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; }
  .column-header .count { color: var(--muted); font-weight: 400; }
  .cards { display: flex; flex-direction: column; gap: 8px; }
  .card { background: var(--card-bg); border-radius: 4px; padding: 10px 12px; cursor: pointer; position: relative; box-shadow: 0 1px 2px rgba(9,30,66,.13); font-size: 13px; }
  .card .title { font-weight: 500; margin-bottom: 6px; }
  .card .meta { display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--muted); }
  .card .cat { padding: 1px 6px; border-radius: 8px; background: #ddd; }
  .card .due { font-variant-numeric: tabular-nums; }

  /* Switcher bar */
  .switcher { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: #172b4d; color: #fff; padding: 8px 14px; border-radius: 999px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.25); font-size: 13px; z-index: 9999; }
  .switcher button { background: transparent; border: 0; color: #fff; cursor: pointer; font-size: 18px; padding: 2px 6px; line-height: 1; }
  .switcher .label { font-weight: 600; min-width: 200px; text-align: center; }

  /* Overlay base */
  .overlay { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
  .overlay.open { pointer-events: auto; }
  .backdrop { position: absolute; inset: 0; background: rgba(9,30,66,.4); opacity: 0; transition: opacity .15s; }
  .overlay.open .backdrop { opacity: 1; }

  /* ====================== VARIANT A — as-specified ====================== */
  body[data-variant="A"] .card.prio-high { background: #d4edda; border-left: 3px solid #28a745; }
  body[data-variant="A"] .card.prio-med  { background: #fff3cd; border-left: 3px solid #ffc107; }
  body[data-variant="A"] .card.prio-low  { background: #f8d7da; border-left: 3px solid #dc3545; }
  body[data-variant="A"] .card.upcoming  { outline: 2px solid #172b4d; outline-offset: -2px; }
  body[data-variant="A"] .card.overdue   { outline: 2px solid #8b0000; outline-offset: -2px; }
  body[data-variant="A"] .card.completed { position: relative; opacity: 0.75; }
  body[data-variant="A"] .card.completed::after {
    content: "✓"; position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    font-size: 90px; color: rgba(40,167,69,.65); font-weight: 900; pointer-events: none;
  }
  /* Variant A — inline-grow + backdrop blur */
  body[data-variant="A"] .expanded-card {
    position: fixed; background: var(--card-bg); border-radius: 8px;
    box-shadow: 0 12px 40px rgba(0,0,0,.3); padding: 24px; z-index: 101;
    transition: all .22s cubic-bezier(.4,0,.2,1);
  }
  body[data-variant="A"] .overlay.open .backdrop { backdrop-filter: blur(6px); background: rgba(9,30,66,.15); }

  /* ====================== VARIANT B — conservative ====================== */
  body[data-variant="B"] .card.prio-high { background: #f8d7da; border-left: 3px solid #dc3545; }
  body[data-variant="B"] .card.prio-med  { background: #fff3cd; border-left: 3px solid #ffc107; }
  body[data-variant="B"] .card.prio-low  { background: #d4edda; border-left: 3px solid #28a745; }
  body[data-variant="B"] .card.upcoming  { box-shadow: 0 0 0 2px #172b4d; }
  body[data-variant="B"] .card.overdue   { box-shadow: 0 0 0 2px #8b0000; }
  body[data-variant="B"] .card.completed .title,
  body[data-variant="B"] .card.completed .meta { text-decoration: line-through; opacity: 0.55; }
  /* Variant B — right-side drawer */
  body[data-variant="B"] .expanded-card {
    position: fixed; right: 0; top: 0; bottom: 0; width: 420px;
    background: var(--card-bg); box-shadow: -4px 0 16px rgba(0,0,0,.15);
    padding: 24px; z-index: 101; transform: translateX(100%);
    transition: transform .2s ease-out;
  }
  body[data-variant="B"] .overlay.open .expanded-card { transform: translateX(0); }

  /* ====================== VARIANT C — hybrid ====================== */
  body[data-variant="C"] .card.prio-high { background: #d4edda; border-left: 3px solid #28a745; }
  body[data-variant="C"] .card.prio-med  { background: #fff3cd; border-left: 3px solid #ffc107; }
  body[data-variant="C"] .card.prio-low  { background: #f8d7da; border-left: 3px solid #dc3545; }
  body[data-variant="C"] .card.upcoming  { outline: 2px solid #172b4d; outline-offset: -2px; }
  body[data-variant="C"] .card.overdue   { outline: 2px solid #8b0000; outline-offset: -2px; }
  body[data-variant="C"] .card.completed { position: relative; opacity: 0.75; }
  body[data-variant="C"] .card.completed::after {
    content: "✓"; position: absolute; top: 4px; right: 6px;
    font-size: 20px; color: #28a745; font-weight: 900;
  }
  /* Variant C — centred modal, no blur */
  body[data-variant="C"] .expanded-card {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    background: var(--card-bg); border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,.25); padding: 24px;
    width: 480px; max-height: 80vh; z-index: 101;
  }

  /* Expanded card content (shared) */
  .expanded-card h2 { margin: 0 0 12px; font-size: 18px; }
  .expanded-card .desc { color: var(--muted); margin: 0 0 16px; line-height: 1.4; }
  .expanded-card .row { display: flex; gap: 12px; margin-bottom: 10px; font-size: 13px; }
  .expanded-card .row strong { min-width: 80px; color: var(--muted); font-weight: 500; }
  .expanded-card .subtasks { margin-top: 16px; }
  .expanded-card .subtasks li { list-style: none; padding: 4px 0; }
  .expanded-card .subtasks input { margin-right: 8px; }
  .expanded-card .close { position: absolute; top: 10px; right: 12px; background: none; border: 0; font-size: 20px; cursor: pointer; color: var(--muted); }

  footer { text-align: center; padding: 20px; font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<header>
  <span class="badge">PROTOTYPE</span>
  <h1>Kanban — visual prototype</h1>
  <span class="variant-name" id="variantName"></span>
</header>

<div class="board" id="board"></div>

<div class="overlay" id="overlay">
  <div class="backdrop" id="backdrop"></div>
  <div class="expanded-card" id="expandedCard" style="display:none"></div>
</div>

<div class="switcher" role="navigation" aria-label="variant switcher">
  <button id="prev" aria-label="previous variant">←</button>
  <span class="label" id="switchLabel"></span>
  <button id="next" aria-label="next variant">→</button>
</div>

<footer>Rev01</footer>

<script>
  // ---- sample data (in-memory only) ----
  const TODAY = new Date('2026-05-26');
  const fmt = (d) => {
    if (!d) return '';
    const x = new Date(d);
    const dd = String(x.getDate()).padStart(2,'0');
    const mm = String(x.getMonth()+1).padStart(2,'0');
    return x.getFullYear() === TODAY.getFullYear() ? `${dd}/${mm}` : `${dd}/${mm}/${x.getFullYear()}`;
  };
  const days = (n) => { const d = new Date(TODAY); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };

  const STATE = {
    columns: [
      { id: 1, name: 'To Do', is_terminal: false },
      { id: 2, name: 'Doing', is_terminal: false },
      { id: 3, name: 'Completed', is_terminal: true },
    ],
    tasks: [
      { id:1, title:'Renew driving licence', col:1, prio:'high', cat:'personal',  due:days(-2), scope:'week', desc:'Slot at municipality office. Need passport photo.', sub:[{b:'Get passport photo',c:true},{b:'Book slot',c:false}] },
      { id:2, title:'Read DDD book ch.4',     col:1, prio:'med',  cat:'work/study', due:days(5),  scope:'week', desc:'Aggregate roots + repositories.', sub:[] },
      { id:3, title:'Replace lightbulb',      col:1, prio:'low',  cat:'personal',  due:null,     scope:null,   desc:'', sub:[] },
      { id:4, title:'Finish Q2 report',       col:2, prio:'high', cat:'work/study', due:days(1),  scope:'day',  desc:'Charts, exec summary, peer review.', sub:[{b:'Pull data',c:true},{b:'Charts',c:true},{b:'Draft',c:false},{b:'Peer review',c:false}] },
      { id:5, title:'Buy mum birthday gift',  col:2, prio:'med',  cat:'personal',  due:days(3),  scope:'week', desc:'Something handmade.', sub:[] },
      { id:6, title:'Side project sketch',    col:2, prio:'low',  cat:'personal',  due:null,     scope:null,   desc:'', sub:[] },
      { id:7, title:'Submit timesheet',       col:3, prio:'med',  cat:'work/study', due:days(-7), scope:'week', desc:'', sub:[] },
      { id:8, title:'Cancel gym membership',  col:3, prio:'low',  cat:'personal',  due:days(-3), scope:'month',desc:'', sub:[] },
      { id:9, title:'Pay credit card',        col:3, prio:'high', cat:'personal',  due:days(-1), scope:'day',  desc:'', sub:[{b:'Log in to bank',c:true},{b:'Transfer',c:true}] },
    ],
  };

  // upcoming/overdue logic (simplified)
  function isOverdue(t)  { return t.due && new Date(t.due) < TODAY; }
  function isUpcoming(t) {
    if (!t.due || !t.scope) return false;
    const window = { day: 3/24, week: 3, month: 7, year: 90 }[t.scope] || 0;
    const diff = (new Date(t.due) - TODAY) / 86400000;
    return diff >= 0 && diff <= window;
  }

  // ---- variants ----
  const VARIANTS = [
    { key: 'A', name: 'A — As-spec (inverted, large ✓, inline-grow + blur)' },
    { key: 'B', name: 'B — Conservative (red=high, strikethrough, side drawer)' },
    { key: 'C', name: 'C — Hybrid (inverted, corner ✓, centred modal)' },
  ];

  function getVariant() {
    const p = new URLSearchParams(location.search).get('variant');
    return VARIANTS.find(v => v.key === p) ? p : 'A';
  }
  function setVariant(key) {
    const url = new URL(location);
    url.searchParams.set('variant', key);
    history.replaceState(null, '', url);
    document.body.dataset.variant = key;
    document.getElementById('switchLabel').textContent = VARIANTS.find(v => v.key === key).name;
    document.getElementById('variantName').textContent = VARIANTS.find(v => v.key === key).name;
    render();
  }
  function cycle(dir) {
    const cur = getVariant();
    const i = VARIANTS.findIndex(v => v.key === cur);
    const next = VARIANTS[(i + dir + VARIANTS.length) % VARIANTS.length];
    setVariant(next.key);
  }

  // ---- render ----
  function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    for (const col of STATE.columns) {
      const tasks = STATE.tasks.filter(t => t.col === col.id);
      const colEl = document.createElement('div');
      colEl.className = 'column';
      colEl.innerHTML = `<div class="column-header"><span>${col.name}</span><span class="count">${tasks.length}</span></div><div class="cards"></div>`;
      const cardsEl = colEl.querySelector('.cards');
      for (const t of tasks) {
        const cardEl = document.createElement('div');
        const classes = ['card', `prio-${t.prio}`];
        if (col.is_terminal) classes.push('completed');
        if (isOverdue(t)) classes.push('overdue');
        else if (isUpcoming(t)) classes.push('upcoming');
        cardEl.className = classes.join(' ');
        cardEl.innerHTML = `
          <div class="title">${t.title}</div>
          <div class="meta">
            <span class="cat">${t.cat}</span>
            ${t.due ? `<span class="due">${fmt(t.due)}</span>` : ''}
            ${t.sub.length ? `<span>${t.sub.filter(s=>s.c).length}/${t.sub.length}</span>` : ''}
          </div>`;
        cardEl.addEventListener('click', () => openCard(t, cardEl));
        cardsEl.appendChild(cardEl);
      }
      board.appendChild(colEl);
    }
  }

  // ---- expand ----
  function openCard(t, cardEl) {
    const overlay = document.getElementById('overlay');
    const card = document.getElementById('expandedCard');
    card.style.display = 'block';
    card.innerHTML = `
      <button class="close" id="closeExpanded">×</button>
      <h2>${t.title}</h2>
      <p class="desc">${t.desc || '<em style="color:#aaa">No description</em>'}</p>
      <div class="row"><strong>Category</strong> ${t.cat}</div>
      <div class="row"><strong>Priority</strong> ${t.prio}</div>
      ${t.due ? `<div class="row"><strong>Due</strong> ${fmt(t.due)} (${t.scope})</div>` : ''}
      ${t.sub.length ? `
        <div class="subtasks"><strong style="font-size:12px;color:#5e6c84">SUBTASKS</strong>
          <ul style="padding:0;margin:8px 0 0">
            ${t.sub.map(s => `<li><input type="checkbox" ${s.c?'checked':''}> ${s.b}</li>`).join('')}
          </ul>
        </div>` : ''}
    `;

    // Variant A inline-grow: position card over its source, animate to centre
    if (getVariant() === 'A') {
      const rect = cardEl.getBoundingClientRect();
      card.style.left = rect.left + 'px';
      card.style.top = rect.top + 'px';
      card.style.width = rect.width + 'px';
      card.style.height = rect.height + 'px';
      card.style.borderRadius = '4px';
      card.style.padding = '10px 12px';
      requestAnimationFrame(() => {
        card.style.left = '50%';
        card.style.top = '50%';
        card.style.width = '480px';
        card.style.height = 'auto';
        card.style.transform = 'translate(-50%, -50%)';
        card.style.borderRadius = '8px';
        card.style.padding = '24px';
      });
    } else {
      card.style.cssText = ''; // reset inline styles between variants
      card.style.display = 'block';
    }

    overlay.classList.add('open');
    document.getElementById('closeExpanded').addEventListener('click', closeCard);
    document.getElementById('backdrop').addEventListener('click', closeCard, { once: true });
  }
  function closeCard() {
    const overlay = document.getElementById('overlay');
    const card = document.getElementById('expandedCard');
    overlay.classList.remove('open');
    setTimeout(() => { card.style.display = 'none'; card.style.cssText = ''; }, 200);
  }

  // ---- switcher events ----
  document.getElementById('prev').addEventListener('click', () => cycle(-1));
  document.getElementById('next').addEventListener('click', () => cycle(1));
  document.addEventListener('keydown', (e) => {
    const tag = (e.target.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'textarea' || e.target.isContentEditable) return;
    if (e.key === 'ArrowLeft')  cycle(-1);
    if (e.key === 'ArrowRight') cycle(1);
    if (e.key === 'Escape')     closeCard();
  });

  setVariant(getVariant());
</script>
</body>
</html>
